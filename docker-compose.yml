# RAG-enterprise local development infrastructure.
# Platform release: 1.0.0
# Production deployment is intentionally out of scope for this skeleton.

x-rag-enterprise-labels: &rag-enterprise-labels
  com.rag-enterprise.version: "1.0.0"
  org.opencontainers.image.version: "1.0.0"
  org.opencontainers.image.title: "RAG-enterprise"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-enterprise-postgres
    restart: unless-stopped
    labels:
      <<: *rag-enterprise-labels
      com.rag-enterprise.service: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-rag_enterprise}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag_enterprise}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: rag-enterprise-redis
    restart: unless-stopped
    labels:
      <<: *rag-enterprise-labels
      com.rag-enterprise.service: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
